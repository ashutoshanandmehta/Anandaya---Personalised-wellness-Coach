services:
  - type: web
    name: health-coach-ai
    env: node
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    plan: free
    region: ohio
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
